name: pums
description: Prisoner & Undertrial Monitoring System — Karnataka State Police
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Database — mobile / desktop
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3

  # Database — web
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0
  collection: ^1.18.0
  equatable: ^2.0.5

  # Excel import / export
  excel: ^4.0.3
  file_picker: ^8.0.3

  # PDF export
  pdf: ^3.10.8
  printing: ^5.13.1

  # Icons & UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Shared prefs (settings / auth session)
  shared_preferences: ^2.2.3

  # Crypto (password hashing)
  crypto: ^3.0.3

  # Date picker
  syncfusion_flutter_datepicker: ^25.1.41

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/data/
